<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <meta name="description" content="Play Master's Quizzes! Test your knowledge with our free interactive quizzes. Challenge yourself and see your score instantly.For Sri Lankans only.Power of BCG!">

    <title>Master's Quizzes</title>
    <style>
        :root {
    --bg-cyan: #40fff5;
    --accent-yellow: #f8ff2b;
    --primary-blue: #1c15ff;
    --success-green: #229400;
    --error-red: #ff000a;
    --royal-gold: #FFD700; 
    --underline-pink: #FF1493; 
    --btn-border: #004d40;
}

body { background-color: var(--bg-cyan); margin: 0; height: 100vh; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }

@keyframes rotateNova { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

@keyframes fadeInSlide {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}

.screen { 
    display: none; 
    position: fixed; 
    inset: 0; 
    background: var(--bg-cyan); 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    z-index: 4000;
}

.screen.active {
    display: flex;
    animation: fadeInSlide 0.4s ease-out forwards;
}

.screen.fade-out {
    animation: fadeOut 0.3s ease-in forwards;
}

#start-screen { position: fixed; inset: 0; background: var(--bg-cyan); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 9999; padding-top: 50px; }
.start-title { font-family: 'Georgia', serif; font-size: 30px; font-weight: 900; color: var(--royal-gold); text-align: center; text-decoration: underline double var(--underline-pink); text-underline-offset: 15px; }

#nova-globe { 
    width: 315px; 
    height: 315px; 
    margin-top: 100px; 
    border-radius: 50%; 
    background: url('globe.png') center/cover no-repeat; 
    box-shadow: 0 0 30px rgba(0,0,0,0.25); 
    animation: rotateNova 25s linear infinite; 
}

.top-nav { position: absolute; top: 20px; width: 92%; display: flex; }
.btn-nav-icon { background: var(--accent-yellow); border: 3px solid var(--btn-border); border-radius: 12px; width: 39px; height: 39px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 0px var(--btn-border); }

.btn-menu { display: block; margin: 12px auto; width: 260px; height: 58px; background: linear-gradient(145deg, var(--accent-yellow), #e1e800); border: 4px solid var(--btn-border); border-radius: 50px; font-size: 22px; color: var(--primary-blue); font-weight: 900; box-shadow: 4px 4px 0px var(--btn-border); cursor: pointer; transition: transform 0.1s; }
.btn-menu:active { transform: scale(0.95); }
.no-shadow-btn { box-shadow: none !important; }

.q-header-title { font-size: 30px; color: var(--primary-blue); font-weight: 900; text-align: center; margin-bottom: 15px; }
.no-shadow-title { text-shadow: none !important; font-family: 'Georgia', serif; text-decoration: underline double var(--underline-pink); text-underline-offset: 10px; }

.stats-bar { width: 85%; display: flex; justify-content: space-between; font-weight: 900; font-size: 18px; margin-bottom: 20px; }

.q-row { display: flex; align-items: center; gap: 15px; width: 90%; margin-bottom: 25px; }
.q-circle { width: 60px; height: 60px; background: var(--accent-yellow); border: 3.5px solid var(--primary-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: 900; flex-shrink: 0; }
.q-box { flex-grow: 1; min-height: 75px; background: transparent; border: 3px solid #000; border-radius: 15px; display: flex; align-items: center; padding: 12px 18px; font-weight: 700; font-size: 17px; }

#quiz-container .q-box { font-size: 15px; }
#quiz-container .yasiru { font-size: 16px; transition: color 0.3s ease; }

.opt-row { display: flex; align-items: center; width: 85%; margin-bottom: 12px; padding: 15px; border: 3px solid #000; border-radius: 18px; background-color: transparent; cursor: pointer; transition: 0.3s; }
.opt-row input[type="radio"] { margin-right: 15px; transform: scale(1.5); cursor: pointer; }

.yasiru { font-size: 19px; font-weight: 900; color: #000; }

.correct-text { color: var(--success-green) !important; }
.wrong-text { color: var(--error-red) !important; }

/* Changed feedback font-size to 24px */
#feedback { min-height: 40px; width: 90%; text-align: center; font-size: 20px; font-weight: 900; margin: 10px 0; border: none; background: transparent; }

.btn-submit { display: block; margin: 10px auto; width: 210px; height: 58px; background: var(--accent-yellow); border: 4px solid var(--success-green); border-radius: 40px; font-size: 24px; color: #1a008f; font-weight: 900; cursor: pointer; }

#final-score { font-size: 80px; font-weight: 900; color: var(--success-green); border: 8px double #000; padding: 20px 40px; border-radius: 20px; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 5000; justify-content: center; align-items: center; }
.settings-card { background: var(--bg-cyan); border: 3px solid #000; border-radius: 20px; width: 280px; padding: 20px; box-shadow: none !important; }

    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="start-title">MASTER'S QUIZZES</h1>
        <div id="nova-globe"></div>
    </div>

    <div id="menu-screen" class="screen">
        <h1 class="q-header-title main-menu-title" style="font-size:40px; color:#20d400; text-decoration: underline double var(--underline-pink); text-underline-offset:10px;">Main Menu</h1>
        <button class="btn-menu" onclick="showGrades()">Play</button>
        <button class="btn-menu" onclick="toggleSettings(true)">Settings</button>
        <button class="btn-menu" onclick="alert('How to Play:\n1. Select your Grade and Subject.\n2. Answer questions before the timer runs out.\n3. Tap Submit to check your answer.')">How to Play</button>
        <button class="btn-menu">High Scores</button>
        <button class="btn-menu" onclick="alert('Master\'s Quizzes v1.0\nCreated for Students.')">Info</button>
    </div>

    <div id="settings-overlay" class="overlay">
        <div class="popup settings-card">
            <div class="popup-header">
                <h2 class="settings-title-styled">SETTINGS</h2>
            </div>
            <div class="settings-body">
                <div class="setting-row">
                    <label class="setting-label-dark">Difficulty</label>
                    <select id="diff-select" class="custom-select">
                        <option value="10">Easy</option>
                        <option value="5" selected>Normal</option>
                        <option value="3">Hard</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label class="setting-label-dark">Questions</label>
                    <select id="limit-select" class="custom-select">
                        <option value="10">10 Q</option>
                        <option value="50">50 Q</option>
                        <option value="100" selected>100 Q</option>
                    </select>
                </div>
            </div>
            <div class="popup-footer">
                <button class="btn-save-settings" onclick="toggleSettings(false)">SAVE</button>
            </div>
        </div>
    </div>

    <div id="grade-screen" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="goHome()">⬅️</button></div>
        <h1 class="q-header-title no-shadow-title">Select Grade</h1>
        <div class="grade-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade()">Grade 6</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade()">Grade 7</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade()">Grade 8</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade()">Grade 9</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade()">Grade 10</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade()">Grade 11</button>
        </div>
        <button class="btn-menu no-shadow-btn" style="margin-top:20px; width:280px;" onclick="selectGrade()">O/L Mode</button>
    </div>

    <div id="subject-screen" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="showGrades()">⬅️</button></div>
        <h1 class="q-header-title no-shadow-title">Select Subject</h1>
        <button class="btn-menu no-shadow-btn" onclick="showTerms('භූගෝල විද්‍යාව')">භූගෝල විද්‍යාව</button>
        <button class="btn-menu no-shadow-btn" onclick="showTerms('ඉතිහාසය')">ඉතිහාසය</button>
    </div>

    <div id="term-screen" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="selectGrade()">⬅️</button></div>
        <h1 class="q-header-title no-shadow-title">Select Term</h1>
        <button class="btn-menu no-shadow-btn" onclick="startGame()">1. First Term</button>
        <button class="btn-menu no-shadow-btn" onclick="startGame()">2. Second Term</button>
        <button class="btn-menu no-shadow-btn" onclick="startGame()">3. Third Term</button>
    </div>

    <div id="quiz-container" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="handleBackRequest()">⬅️</button></div>
        <h1 class="q-header-title" id="active-subj">Geography</h1>
        <div class="stats-bar">
            <div id="timer-box" style="color: var(--error-red);">Time: 05s</div>
            <div>Score: <span id="live-score">0%</span></div>
        </div>
        <div class="q-row">
            <div class="q-circle" id="q-idx">1</div>
            <div class="q-box" id="q-text">ප්‍රශ්නය පූරණය වේ...</div>
        </div>
        <div id="options-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <label class="opt-row"><input type="radio" name="opt" id="o0"><span class="yasiru" id="t0"></span></label>
            <label class="opt-row"><input type="radio" name="opt" id="o1"><span class="yasiru" id="t1"></span></label>
            <label class="opt-row"><input type="radio" name="opt" id="o2"><span class="yasiru" id="t2"></span></label>
            <label class="opt-row"><input type="radio" name="opt" id="o3"><span class="yasiru" id="t3"></span></label>
        </div>
        <p id="feedback"></p>
        <button class="btn-submit" id="main-submit" onclick="check()">SUBMIT</button>
    </div>

    <div id="result-screen" class="screen">
        <h1 class="q-header-title" style="font-size: 40px;">Final Score</h1>
        <div id="final-score">0%</div>
        <button class="btn-menu" onclick="location.reload()">REPLAY</button>
    </div>

    <script>const masterQuestionBank = [
    { q: "ශ්‍රී ලංකාවේ ජාතික ගස කුමක්ද?", options: ["නා", "බෝ", "කොඩොල්", "පොල්"], correct: 0 },
    { q: "ලෝකයේ විශාලතම සාගරය කුමක්ද?", options: ["අත්ලාන්තික්", "ශාන්තිකර", "ඉන්දියන්", "ආක්ටික්"], correct: 1 },
    { q: "ශ්‍රී ලංකාවේ ජාතික සත්වයා කවුද?", options: ["අලියා", "වලහා", "වලිකුකුළා", "කොටියා"], correct: 2 }
];

let shuffled = [], current = 0, score = 0, isAnswered = false, timer, timeLeft = 5, selectedSubj = "";
let difficultyTime = 5, sessionLimit = 100;

window.onload = () => { 
    history.replaceState({ screen: 'menu-screen' }, "", "");
    setTimeout(() => { 
        const start = document.getElementById('start-screen');
        start.style.transition = "opacity 0.5s";
        start.style.opacity = "0";
        setTimeout(() => {
            start.style.display = "none";
            showScreen('menu-screen', true); 
        }, 500);
    }, 4000); 
};

window.onpopstate = function(event) {
    const quizScreen = document.getElementById('quiz-container');
    if (quizScreen.classList.contains('active')) {
        if (confirm("Exit quiz and lose progress?")) {
            showScreen('menu-screen');
        } else {
            history.pushState({ screen: 'quiz-container' }, "", "");
        }
        return;
    }
    if (event.state && event.state.screen) {
        showScreen(event.state.screen, true);
    } else {
        showScreen('menu-screen', true);
    }
};

function handleBackRequest() {
    if (confirm("Exit quiz? Progress will be lost.")) {
        showScreen('term-screen');
    }
}

function showScreen(screenId, isBack = false) {
    const currentScreen = document.querySelector('.screen.active');
    const targetScreen = document.getElementById(screenId);

    if (currentScreen) {
        currentScreen.classList.add('fade-out');
        setTimeout(() => {
            currentScreen.classList.remove('active', 'fade-out');
            currentScreen.style.display = "none";
            
            targetScreen.style.display = "flex";
            targetScreen.classList.add('active');
        }, 300);
    } else {
        document.querySelectorAll('.screen').forEach(s => {
            s.style.display = "none";
            s.classList.remove('active');
        });
        targetScreen.style.display = "flex";
        targetScreen.classList.add('active');
    }
    
    if (!isBack) history.pushState({ screen: screenId }, "", "");
}

function toggleSettings(show) {
    const overlay = document.getElementById('settings-overlay');
    overlay.style.display = show ? "flex" : "none";
    if (!show) {
        difficultyTime = parseInt(document.getElementById('diff-select').value);
        sessionLimit = parseInt(document.getElementById('limit-select').value);
    }
}

function goHome() { showScreen('menu-screen'); }
function showGrades() { showScreen('grade-screen'); }
function selectGrade() { showScreen('subject-screen'); }
function showTerms(subj) { if(subj) selectedSubj = subj; showScreen('term-screen'); }

function startGame() {
    showScreen('quiz-container');
    document.getElementById('active-subj').innerText = selectedSubj || "Geography";
    let tempShuffled = [...masterQuestionBank].sort(() => Math.random() - 0.5);
    shuffled = tempShuffled.slice(0, sessionLimit); 
    current = 0; score = 0;
    loadQuestion();
}

function loadQuestion() {
    isAnswered = false;
    document.getElementById('main-submit').style.visibility = "visible";
    document.getElementById('feedback').innerText = "";
    const data = shuffled[current];
    document.getElementById('q-idx').innerText = current + 1;
    document.getElementById('q-text').innerText = data.q;
    const labels = document.querySelectorAll('.opt-row');
    const texts = document.querySelectorAll('.yasiru');
    labels.forEach((label, i) => {
        texts[i].innerText = data.options[i];
        texts[i].classList.remove('correct-text', 'wrong-text');
        const radio = document.getElementById(`o${i}`);
        radio.checked = false; radio.disabled = false;
    });
    startTimer();
}

function startTimer() {
    clearInterval(timer); timeLeft = difficultyTime;
    document.getElementById('timer-box').innerText = `Time: ${timeLeft < 10 ? '0' + timeLeft : timeLeft}s`;
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-box').innerText = `Time: ${timeLeft < 10 ? '0' + timeLeft : timeLeft}s`;
        if(timeLeft <= 0) { 
            clearInterval(timer); 
            highlightCorrect(); 
            handleEnd("ඔබගේ කාලය අවසන්!", false); 
        }
    }, 1000);
}

function check() {
    if(isAnswered) return;
    let sel = -1;
    for(let i=0; i<4; i++) if(document.getElementById(`o${i}`).checked) sel = i;
    
    if(sel === -1) {
        const f = document.getElementById('feedback');
        f.innerText = "කරුණාකර පිළිතුරක් තෝරන්න!";
        f.style.color = "var(--error-red)";
        return;
    }

    clearInterval(timer);
    const cor = shuffled[current].correct;
    const texts = document.querySelectorAll('.yasiru');
    if(sel === cor) { 
        score++; 
        texts[sel].classList.add('correct-text'); 
        handleEnd("ඔබගේ පිළිතුර නිවැරදියි!", true); 
    } 
    else { 
        texts[sel].classList.add('wrong-text'); 
        highlightCorrect(); 
        handleEnd("ඔබගේ පිළිතුර වැරදියි!", false); 
    }
}

function highlightCorrect() {
    const cor = shuffled[current].correct;
    document.querySelectorAll('.yasiru')[cor].classList.add('correct-text');
}

function handleEnd(msg, isCorrect) {
    isAnswered = true;
    document.getElementById('main-submit').style.visibility = "hidden";
    for(let i=0; i<4; i++) document.getElementById(`o${i}`).disabled = true;
    const f = document.getElementById('feedback');
    f.innerText = msg; f.style.color = isCorrect ? "var(--success-green)" : "var(--error-red)";
    setTimeout(() => {
        current++;
        if(current < shuffled.length) { 
            loadQuestion(); 
            document.getElementById('live-score').innerText = Math.round((score/shuffled.length)*100) + "%"; 
        } else { 
            showScreen('result-screen'); 
            document.getElementById('final-score').innerText = Math.round((score/shuffled.length)*100) + "%"; 
        }
    }, 2000);
}
</script>
</body>
</html>
