<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <meta name="google-site-verification" content="masters quizzes sri lanka" />
    <meta name="description" content="Play Master's Quizzes! Test your knowledge with our free interactive quizzes. Challenge yourself and see your score instantly.For Sri Lankans only.Power of BCG!">
    <meta name="keywords" content="masters quizzes pro,master's quizzes,masters quizzes sri lanka,master quizzes,master quiz,masterquiz,masters quizzes pro in sri lanka,quiz website,super quizzes,master's quizzes pro srilanka" /> 
    <title>Master's Quizzes</title>
    <link rel="canonical" href="https://github.io" />
    <link rel="preload" href="globe.png" as="image">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. START SCREEN -->
    <div id="start-screen">
        <h1 class="start-title">MASTER'S QUIZZES</h1>
        <div id="nova-globe"></div>
    </div>

    <!-- 2. LOGIN SCREEN -->
    <div id="login-screen" class="screen">
        <h1 class="q-header-title no-shadow-title">Login</h1>
        <div style="width: 85%; display: flex; flex-direction: column; align-items: center;">
            <input type="text" id="usernameField" placeholder="Username" style="width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 3px solid var(--btn-border); padding: 5px; font-weight: 700; background: #fff;">
            <input type="password" id="passwordField" placeholder="Password" style="width: 100%; height: 45px; margin-bottom: 20px; border-radius: 10px; border: 3px solid var(--btn-border); padding: 5px; font-weight: 700; background: #fff;">
            <button class="btn-menu" onclick="handleLogin()" style="width: 100%;">LOGIN</button>
        </div>
        <p id="login-feedback"></p>
    </div>

    <!-- 3. MAIN MENU -->
    <div id="menu-screen" class="screen">
        <h1 class="q-header-title main-menu-title" style="font-size:40px; color:#20d400; text-decoration: underline double var(--underline-pink); text-underline-offset:10px;">Main Menu</h1>
        <button class="btn-menu" onclick="showGrades()">Play</button>
        <button class="btn-menu" onclick="toggleSettings(true)">Settings</button>
        <button class="btn-menu" onclick="alert('How to Play:\n1. Select your Grade and Subject.\n2. Answer questions before the timer runs out.\n3. Tap Submit to check your answer.')">How to Play</button>
        <button class="btn-menu">High Scores</button>
        <button class="btn-menu" onclick="alert('Master\'s Quizzes v1.0\nCreated for Students.\nPower of BCG!')">Info</button>
        <button class="xxx" style="font-size: 14px; height: 40px;" onclick="showScreen('admin-screen')">Admin Panel</button>
    </div>

    <!-- 4. SETTINGS OVERLAY -->
    <div id="settings-overlay" class="overlay">
        <div class="popup settings-card">
            <h2 class="settings-title-styled">SETTINGS</h2>
            <div class="setting-row">
                <label class="setting-label-dark">Difficulty</label>
                <select id="diff-select" class="custom-select">
                    <option value="10">Easy</option>
                    <option value="5" selected>Normal</option>
                    <option value="3">Hard</option>
                </select>
            </div>
            <div class="setting-row">
                <label class="setting-label-dark">Questions</label>
                <select id="limit-select" class="custom-select">
                    <option value="10">10 Q</option>
                    <option value="50">50 Q</option>
                    <option value="100" selected>100 Q</option>
                </select>
            </div>
            <button class="btn-submit" onclick="toggleSettings(false)" style="width:120px; height:45px;">SAVE</button>
        </div>
    </div>

    <!-- 5. GRADE SELECTION -->
    <div id="grade-screen" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="goHome()">⬅️</button></div>
        <h1 class="q-header-title no-shadow-title">Select Grade</h1>
        <div class="grade-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 6')">Grade 6</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 7')">Grade 7</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 8')">Grade 8</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 9')">Grade 9</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 10')">Grade 10</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 11')">Grade 11</button>
        </div>
        <button class="btn-menu no-shadow-btn" style="margin-top:20px; width:280px;" onclick="selectGrade('O/L Mode')">O/L Mode</button>
    </div>

    <!-- 6. SUBJECT SELECTION -->
    <div id="subject-screen" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="showGrades()">⬅️</button></div>
        <h1 class="q-header-title no-shadow-title">Select Subject</h1>
        <div class="subject-list" style="overflow-y: auto; width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px;">
            <button class="btn-menu no-shadow-btn" onclick="showTerms('භූගෝල විද්‍යාව')">භූගෝල විද්‍යාව</button>
            <button class="btn-menu no-shadow-btn" onclick="showTerms('ඉතිහාසය')">ඉතිහාසය</button>
            <button class="btn-menu no-shadow-btn" onclick="showTerms('විද්‍යාව')">විද්‍යාව</button>
            <button class="btn-menu no-shadow-btn" onclick="showTerms('සිංහල')">සිංහල</button>
            <button class="btn-menu no-shadow-btn" onclick="showTerms('ගණිතය')">ගණිතය</button>
            <button class="btn-menu no-shadow-btn" onclick="showTerms('බුද්ධ ධර්මය')">බුද්ධ ධර්මය</button>
            <button class="btn-menu no-shadow-btn" onclick="showTerms('තොරතුරු තාක්ෂණය')">I.C.T</button>
            <button class="btn-menu no-shadow-btn" onclick="showTerms('පුරවැසි අධ්‍යාපනය')">පුරවැසි අධ්‍යාපනය</button>
            <button class="btn-menu no-shadow-btn" onclick="showTerms('සෞඛ්‍යය හා ශාරීරික අධ්‍යාපනය')">සෞඛ්‍යය</button>
            <button class="btn-menu no-shadow-btn" onclick="showTerms('නාට්‍ය හා රංගකලාව')">Drama</button>
        </div>
    </div>

    <!-- 7. TERM SELECTION -->
    <div id="term-screen" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="showScreen('subject-screen')">⬅️</button></div>
        <h1 class="q-header-title no-shadow-title">Select Term</h1>
        <button class="btn-menu no-shadow-btn" onclick="startGame('1st Term')">1. First Term</button>
        <button class="btn-menu no-shadow-btn" onclick="startGame('2nd Term')">2. Second Term</button>
        <button class="btn-menu no-shadow-btn" onclick="startGame('3rd Term')">3. Third Term</button>
    </div>

    <!-- 8. QUIZ CONTAINER -->
    <div id="quiz-container" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="handleBackRequest()">⬅️</button></div>
        <h1 class="q-header-title" id="active-subj" style="text-decoration: double underline #FF1493; text-underline-offset: 10px;">Geography</h1>
        <div class="stats-bar">
            <div id="timer-box" style="color: var(--error-red);">Time: 05s</div>
            <div>Score: <span id="live-score">0%</span></div>
        </div>
        <div class="q-row">
            <div class="q-circle" id="q-idx">1</div>
            <div class="q-box" id="q-text">ප්‍රශ්නය පූරණය වේ...</div>
        </div>
        <div id="options-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <label class="opt-row"><input type="radio" name="opt" id="o0"><span class="yasiru" id="t0"></span></label>
            <label class="opt-row"><input type="radio" name="opt" id="o1"><span class="yasiru" id="t1"></span></label>
            <label class="opt-row"><input type="radio" name="opt" id="o2"><span class="yasiru" id="t2"></span></label>
            <label class="opt-row"><input type="radio" name="opt" id="o3"><span class="yasiru" id="t3"></span></label>
        </div>
        <p id="feedback"></p>
        <button class="btn-submit" id="main-submit" onclick="check()">SUBMIT</button>
    </div>

    <!-- 9. ADMIN PANEL -->
    <div id="admin-screen" class="screen" hidden>
        <div class="top-nav"><button class="btn-nav-icon" onclick="goHome()">🏠</button></div>
        <h1 class="q-header-title">Admin Code Generator</h1>
        <div style="width: 90%; background: white; padding: 15px; border-radius: 20px; border: 3px solid black; display: flex; flex-direction: column; align-items: center;">
            <input type="text" id="adm-q" placeholder="Enter Question" style="width:95%; margin-bottom: 5px;">
            <input type="text" id="adm-o0" placeholder="Option 1" style="width:95%;">
            <input type="text" id="adm-o1" placeholder="Option 2" style="width:95%;">
            <input type="text" id="adm-o2" placeholder="Option 3" style="width:95%;">
            <input type="text" id="adm-o3" placeholder="Option 4" style="width:95%;">
            <select id="adm-cor" class="custom-select" style="width: 100%; margin: 10px 0;">
                <option value="0">Correct: 1</option>
                <option value="1">Correct: 2</option>
                <option value="2">Correct: 3</option>
                <option value="3">Correct: 4</option>
            </select>
            <button class="btn-submit" onclick="generateJSON()" style="width: 100%;">GENERATE</button>
            <textarea id="json-output" readonly style="width: 100%; height: 60px; margin-top: 10px; font-size: 10px;"></textarea>
        </div>
    </div>

    <!-- 10. RESULT SCREEN -->
    <div id="result-screen" class="screen">
        <h1 class="q-header-title" style="font-size: 40px; text-decoration: 4px double underline #FF1493; margin: 14px; text-underline-offset: 10px;">Final Score</h1>
        <div id="final-score" style="font-size: 48px; font-weight: bold; margin: 20px 0;">0%</div>
        <button class="btn-menu" onclick="showScreen('menu-screen')">REPLAY</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
